name: Build Sovereign Serve Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check Out Build Package
        uses: actions/checkout@v4

      - name: Verify Uploaded Source Package
        shell: bash
        run: |
          set -euo pipefail
          test -f sovereign-source.zip || {
            echo "ERROR: sovereign-source.zip is missing from the repository root."
            exit 1
          }
          unzip -t sovereign-source.zip

      - name: Extract Sovereign Serve Source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf source
          mkdir -p source
          unzip -q sovereign-source.zip -d source
          test -f source/package.json
          test -f source/native/java/NativePdfPlugin.java
          test -f source/scripts/prepare_android.py

      - name: Set Up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          pnpm config set registry https://registry.npmjs.org/
          pnpm --version

      - name: Install Build Dependencies
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules pnpm-lock.yaml
          pnpm install --no-frozen-lockfile --reporter=append-only
          python -m pip install --disable-pip-version-check pillow

      - name: Create Capacitor Android Project
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf android
          pnpm exec cap add android

      - name: Apply Sovereign Serve Native Configuration
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          python scripts/prepare_android.py

      - name: Synchronize Web Assets And Plugins
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec cap sync android

      - name: Verify Android Project
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          test -f android/gradlew
          test -f android/settings.gradle
          test -f android/app/build.gradle
          test -f android/app/src/main/java/com/kaiserinconsulting/sovereignserve/NativePdfPlugin.java
          ! grep -q "PrintDocumentAdapter.LayoutResultCallback" android/app/src/main/java/com/kaiserinconsulting/sovereignserve/NativePdfPlugin.java
          chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: source/android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload Installable Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Serve-1.0.3-Debug-APK
          path: source/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Build Reports On Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Serve-Build-Reports
          path: |
            source/android/build/reports/**
            source/android/app/build/reports/**
          if-no-files-found: ignore
          retention-days: 7
